<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="icon"
    href="assets/favicon.png"
    type="image/png"
  >

  <title>Your Name | Resume</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="assets/css/background.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/layout.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/hero.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/cards.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/timeline.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/skills.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/projects.css"
  />

  <link
    rel="stylesheet"
    href="assets/css/utilities.css"
  />

</head>

<body>

  <!-- ANIMATED BACKGROUND -->

  <canvas
    id="canvas_back"
    data-size="40"
    data-opacity="2"
    data-dust="300"
  ></canvas>

  <div id="cover"></div>

  <canvas
    id="canvas_front"
    data-size="3"
    data-opacity="20"
    data-dust="600"
  ></canvas>

  <!-- THEME TOGGLE -->

  <button
    id="theme-toggle"
    class="theme-toggle"
  >
    🌙
  </button>

  <main class="main-content">

    <!-- ABOUT -->

    <section class="content-section fade-section">

      <div class="section-container">

        <div class="parallax-inner">

          <div class="about-card">

            <div class="about-image">

              <img
                id="profile-image"
                src="profile.jpg"
                alt="Profile Picture"
              >

            </div>

            <div class="about-content">

              <span
                id="profile-role"
                class="about-tag"
              >
              </span>

              <h2 id="profile-name"></h2>

              <p id="profile-description"></p>

              <div
                id="profile-socials"
                class="about-socials"
              ></div>

            </div>

          </div>

        </div>

      </div>

    </section>

    <!-- SKILLS -->

    <section class="content-section fade-section">

      <div class="section-container">

        <div class="parallax-inner">

          <h2>Skills</h2>

          <div
            id="skills-grid"
            class="skills-grid"
          ></div>

        </div>

      </div>

    </section>

    <!-- EXPERIENCE -->

    <section class="content-section fade-section">

      <div class="section-container">

        <div class="parallax-inner">

          <h2>Work Experience</h2>

          <div
            id="timeline-container"
            class="timeline"
          ></div>

        </div>

      </div>

    </section>

    <!-- PROJECTS -->

    <section
      id="projects"
      class="content-section fade-section"
    >

      <div class="section-container">

        <div class="parallax-inner">

          <h2>Projects</h2>

          <!-- FEATURED PROJECT -->

          <div class="featured-project">

            <div class="featured-content">

              <div class="featured-left">

                <div
                  id="featured-badge"
                  class="featured-badge"
                ></div>

                <h3 id="featured-title"></h3>

                <p id="featured-description"></p>

                <div
                  id="featured-tags"
                  class="project-tags"
                ></div>

                <a
                  id="featured-link"
                  href="#"
                  class="glass-button"
                >
                  View Live
                </a>

              </div>

              <!-- VISUAL MOCKUP -->

              <div class="featured-right">

                <div class="mock-window">

                  <div class="mock-topbar">
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>

                  <div class="mock-content">

                    <div class="mock-line"></div>

                    <div class="mock-line"></div>

                    <div class="mock-line short"></div>

                    <div class="mock-chart"></div>

                  </div>

                </div>

              </div>

            </div>

          </div>

          <!-- PROJECT GRID -->

          <div
            id="project-grid"
            class="card-grid"
          ></div>

        </div>

      </div>

    </section>

  </main>

  <!-- PROJECT MODAL -->

  <div
    id="project-modal"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2 id="modal-title"></h2>

      <p id="modal-desc"></p>

      <button
        id="close-modal"
        class="glass-button"
      >
        Close
      </button>

    </div>

  </div>

  <!-- JS -->

  <script src="assets/js/utils.js"></script>

  <script src="assets/js/data.js"></script>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/background.js"></script>

  <script src="assets/js/scroll.js"></script>
  <script src="assets/js/parallax.js"></script>
  <script src="assets/js/timeline.js"></script>
  <script src="assets/js/skills.js"></script>
  <script src="assets/js/modal.js"></script>

  <script src="assets/js/app.js"></script>

</body>

</html>
